# llama.cpp model preset: Vision (text + image) model
# Hardware: 32GB VRAM (RTX 5090) + 64GB RAM
#
# Qwen2.5-VL 32B — multimodal vision-language model.
# Handles image understanding, OCR, diagram analysis, and visual QA.
# 32B dense model — uses most of 32GB VRAM at Q4_K_M.
#
# LiveBench scores: https://livebench.ai/#/?highunseenbias=true
# HuggingFace: https://huggingface.co/Qwen/Qwen2.5-VL-32B-Instruct-GGUF
#
# Alternative (smaller): unsloth/Qwen2.5-VL-7B-Instruct-GGUF for faster inference

version = 1

[*]
c = 4096
n-gpu-layers = -1
jinja = true

[Qwen/Qwen2.5-VL-32B-Instruct-GGUF:Q4_K_M]
# ~18 GB — fits in VRAM, strong vision capabilities
c = 8192

[unsloth/Qwen2.5-VL-7B-Instruct-GGUF:Q8_0]
# ~8 GB — lighter alternative, faster inference
c = 8192
