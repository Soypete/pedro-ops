# llama.cpp model preset: Text-to-Speech (TTS) model
# Hardware: 32GB VRAM (RTX 5090) + 64GB RAM
#
# Qwen2.5-Omni 7B — multimodal model with TTS capabilities.
# Run as a separate llama-server process on a different port (8001).
#
# Pair with a generation model on port 8000 for a complete pipeline:
#   Port 8000: text generation (Nemotron, GPT-OSS, etc.)
#   Port 8001: TTS (this preset)
#
# HuggingFace: https://huggingface.co/Qwen/Qwen2.5-Omni-7B

version = 1

[*]
n-gpu-layers = 99
jinja = true

[qwen2.5-omni-7b]
# ~8 GB — lightweight, leaves VRAM headroom for the primary model
c = 8192
