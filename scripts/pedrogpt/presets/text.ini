# llama.cpp model preset: General-purpose text model
# Hardware: 32GB VRAM (RTX 5090) + 64GB RAM
#
# Primary: GPT-OSS 20B — dense text model, fast and fully GPU-resident.
# This is the default everyday model.
#
# Alternative: NVIDIA Nemotron-3-Super 120B-A12B — MoE (12B active).
# Higher quality reasoning but larger download (multi-file GGUF).
#
# LiveBench scores: https://livebench.ai/#/?highunseenbias=true
# HuggingFace: https://huggingface.co/unsloth/gpt-oss-20b-GGUF

version = 1

[*]
c = 8192
n-gpu-layers = -1
jinja = true

# --- Primary: GPT-OSS 20B (dense, fast) ---

[unsloth/gpt-oss-20b-GGUF:Q4_K_M]
# 11.6 GB — fastest, fits fully in VRAM with room to spare
c = 16384
load-on-startup = true

[unsloth/gpt-oss-20b-GGUF:Q8_0]
# 12.1 GB — near-lossless quality, still fits in VRAM
c = 16384

# --- Alternative: Nemotron-3-Super 120B-A12B MoE (12B active) ---

[unsloth/NVIDIA-Nemotron-3-Super-120B-A12B-GGUF:UD-Q4_K_XL]
# Dynamic 4-bit quant (unsloth) — multi-file GGUF, best quality-to-size
c = 16384
temp = 0.6
top-p = 0.95

[unsloth/NVIDIA-Nemotron-3-Super-120B-A12B-GGUF:UD-Q2_K_XL]
# Dynamic 2-bit — smaller footprint, still good quality
c = 16384
temp = 0.6
top-p = 0.95
