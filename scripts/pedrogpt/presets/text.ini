# llama.cpp model preset: General-purpose text model
# Hardware: 32GB VRAM (RTX 5090) + 64GB RAM
#
# GPT-OSS 20B — strong general-purpose text model.
# Fits entirely in VRAM at Q4_K_M. Use Q8_0 for higher quality (still fits).
#
# LiveBench scores: https://livebench.ai/#/?highunseenbias=true
# HuggingFace: https://huggingface.co/unsloth/gpt-oss-20b-GGUF

version = 1

[*]
c = 8192
n-gpu-layers = -1
jinja = true

[unsloth/gpt-oss-20b-GGUF:Q4_K_M]
# 11.6 GB — fastest, fits fully in VRAM with room to spare
c = 16384

[unsloth/gpt-oss-20b-GGUF:Q8_0]
# 12.1 GB — near-lossless quality, still fits in VRAM
c = 16384
