# llama.cpp model preset: Coding model
# Hardware: 32GB VRAM (RTX 5090) + 64GB RAM
#
# Primary: Qwen3-Next 80B-A3B — MoE (80B total, 3B active per token).
# Use -ot ".ffn_.*_exps.=CPU" to offload MoE expert layers to system RAM,
# keeping attention layers on GPU for fast inference with 64K context.
#
# Alternative: Qwen3-Coder 30B-A3B — smaller MoE, fully GPU-resident.
#
# LiveBench scores: https://livebench.ai/#/?highunseenbias=true
# HuggingFace: https://huggingface.co/unsloth/Qwen3-Next-80B-A3B-Instruct-GGUF

version = 1

[*]
c = 8192
n-gpu-layers = -1
jinja = true

# --- Primary: Qwen3-Next 80B-A3B MoE (3B active) ---

[unsloth/Qwen3-Next-80B-A3B-Instruct-GGUF:UD-Q4_K_XL]
# MoE expert offload: -ot ".ffn_.*_exps.=CPU" moves experts to 64GB RAM
# Attention stays on GPU = fast inference despite large model
n-gpu-layers = 99
c = 65536
flash-attn = true

# --- Alternative: Qwen3-Coder 30B-A3B MoE (3B active) ---

[unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q4_K_M]
# 18.6 GB — fits fully in VRAM, no expert offloading needed
c = 32768

[unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q5_K_M]
# 21.7 GB — higher quality, still fits in VRAM
c = 32768
