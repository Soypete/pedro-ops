# llama.cpp model preset: All pedro models (router mode)
# Hardware: 32GB VRAM (RTX 5090) + 64GB RAM
#
# Combined preset for llama-server router mode (--models-preset).
# Only one model loads at a time; the router swaps on demand.
# Use with: llama-server --models-preset ./all-models.ini
#
# See individual preset files (text.ini, code.ini, vision.ini, tts.ini) for details.
#
# For MoE expert offload (Qwen3-Next), add to CLI:
#   -ot ".ffn_.*_exps.=CPU"

version = 1

[*]
c = 8192
n-gpu-layers = -1
jinja = true
stop-timeout = 30

# --- Text: GPT-OSS 20B (default) ---
[unsloth/gpt-oss-20b-GGUF:Q4_K_M]
c = 16384
load-on-startup = true

# --- Text (heavy): Nemotron-3-Super 120B-A12B MoE (12B active) ---
[unsloth/NVIDIA-Nemotron-3-Super-120B-A12B-GGUF:UD-Q4_K_XL]
c = 16384
temp = 0.6
top-p = 0.95

# --- Coding: Qwen3-Next 80B-A3B MoE (3B active) ---
[unsloth/Qwen3-Next-80B-A3B-Instruct-GGUF:UD-Q4_K_XL]
n-gpu-layers = 99
c = 65536
flash-attn = true

# --- Coding (lite): Qwen3-Coder 30B-A3B MoE ---
[unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q4_K_M]
c = 32768

# --- Vision: Qwen2.5-VL 32B ---
[Qwen/Qwen2.5-VL-32B-Instruct-GGUF:Q4_K_M]
c = 8192
