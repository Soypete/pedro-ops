# llama.cpp model preset: All pedro models (router mode)
# Hardware: 32GB VRAM (RTX 5090) + 64GB RAM
#
# Combined preset for llama-server router mode (--models-preset).
# Only one model loads at a time; the router swaps on demand.
# Use with: llama-server --models-preset ./all-models.ini
#
# See individual preset files (text.ini, code.ini, vision.ini) for details.

version = 1

[*]
c = 8192
n-gpu-layers = -1
jinja = true
stop-timeout = 30

# --- Text: GPT-OSS 20B ---
[unsloth/gpt-oss-20b-GGUF:Q4_K_M]
c = 16384
load-on-startup = true

# --- Coding: Qwen3 Coder 30B-A3B MoE ---
[unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF:Q4_K_M]
c = 32768

# --- Vision: Qwen2.5-VL 32B ---
[Qwen/Qwen2.5-VL-32B-Instruct-GGUF:Q4_K_M]
c = 8192
